name: Win7 Test

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  x64:
    runs-on: windows-latest

    steps:
      - name: Initialize repository
        uses: actions/checkout@v4

      - name: Install and switch to the MSVC Rust toolchain
        run: |
          rustup toolchain install nightly
          rustup default nightly
          rustup component add rust-src --toolchain nightly-x86_64-pc-windows-msvc

      - name: Install and extract LLVM into the repository and add it to PATH
        shell: pwsh
        run: |
          $archiveName = 'LLVM-14.0.6-win64.7z'
          $archiveUrl  = 'https://github.com/PLC-lang/llvm-package-windows/releases/download/v14.0.6/LLVM-14.0.6-win64.7z'

          $workspace = $env:GITHUB_WORKSPACE
          $dest = Join-Path $workspace 'LLVM'
          $archivePath = Join-Path $workspace $archiveName

          # Create directory
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Download the archive using PowerShell's native command to avoid depending on wget
          Write-Output "Downloading $archiveUrl -> $archivePath"
          Invoke-WebRequest -Uri $archiveUrl -OutFile $archivePath

          # Ensure 7z is available (it usually exists on the runner; install it with choco if needed)
          if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
            Write-Output '7z not found, installing 7zip via choco'
            choco install 7zip -y
          }

          # Extract to the target directory (note that the -o argument must not contain a space)
          & 7z x $archivePath ("-o$dest") -y
          if ($LASTEXITCODE -ne 0) {
            Write-Error "7z extraction failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          # Try to locate the bin directory (directly under $dest or in a subdirectory)
          $bin = Join-Path $dest 'bin'
          if (-not (Test-Path $bin)) {
            $firstDir = Get-ChildItem -Path $dest -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($firstDir) {
              $altBin = Join-Path $firstDir.FullName 'bin'
              if (Test-Path $altBin) { $bin = $altBin }
            }
          }

          if (-not (Test-Path $bin)) {
            Write-Warning "Could not find the bin directory; the extracted archive structure may be different. Check $dest"
          } else {
            Write-Output "LLVM bin directory: $bin"
            # Append bin to GITHUB_PATH so it is available in later steps
            $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            # Also make it available in the current step
            $env:PATH = "$bin;$env:PATH"
            Write-Output "Added $bin to PATH"
          }

      - name: Build (Windows MSVC)
        run: |
          cargo build --release -Z build-std --target x86_64-win7-windows-msvc

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppDataCleaner
          path: |
            target/x86_64-win7-windows-msvc/release/AppDataCleaner.exe
            target/x86_64-win7-windows-msvc/release/AppDataCleaner.pdb
